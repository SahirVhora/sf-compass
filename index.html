<title>SF Compass — EC Implementation Reference</title>
<style>
/* ── THEME SYSTEM ── */
:root, [data-theme="dark"] {
  --bg: #090d14; --bg2: #0d1119; --surface: #111620; --surface2: #171c28;
  --border: #1c212b; --border2: #252b36;
  --text: #e6e9f0; --text2: #c5c9d4; --dim: #5f6675; --dim2: #3d4350;
  --accent: #c8a84e; --accent2: #e0c46e;
  --green: #3fb96b; --amber: #d4a434; --orange: #e07b3c; --red: #e05151;
  --purple: #8b7cf0; --blue: #5b8def;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.25); --shadow-md: 0 4px 16px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.45);
  --tech-bg: #0f131c; --tech-border: var(--purple);
  --tag-bg: rgba(91,141,239,0.08); --tag-border: rgba(91,141,239,0.1);
  --search-bg: var(--bg); --feas-bg: var(--bg);
  --pill-bg-from: #151a24; --pill-bg-to: #1a1f2b; --pill-border: #262d3a;
  --pill-active-bg-from: rgba(139,124,240,0.2); --pill-active-bg-to: rgba(91,141,239,0.1);
  --entry-hover-border: #2a3040;
  --detail-text: #b8bcc6; --tech-text: #a8adb8;
  --scrollbar-thumb: var(--border);
  --sidebar-header-gradient: linear-gradient(180deg, rgba(200,168,78,0.04) 0%, transparent 100%);
  --h1-gradient: linear-gradient(135deg, #e6e9f0 0%, #c0c5d0 100%);
  --theme-icon: '☀';
}
[data-theme="light"] {
  --bg: #f8f6f2; --bg2: #f0ede8; --surface: #ffffff; --surface2: #faf9f6;
  --border: #e8e4dc; --border2: #dcd7ce;
  --text: #1a1815; --text2: #3d3831; --dim: #7a7368; --dim2: #a0988a;
  --accent: #b8941e; --accent2: #7a5f0e;
  --green: #287a3e; --amber: #a67c18; --orange: #bc5a26; --red: #c93030;
  --purple: #5b4fd4; --blue: #4a68cc;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.05); --shadow-md: 0 4px 14px rgba(0,0,0,0.07);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.09);
  --tech-bg: #f5f2ec; --tech-border: var(--purple);
  --tag-bg: rgba(74,104,204,0.05); --tag-border: rgba(74,104,204,0.1);
  --search-bg: #f0ede8; --feas-bg: #f0ede8;
  --pill-bg-from: #f5f2ec; --pill-bg-to: #efece5; --pill-border: #dcd7ce;
  --pill-active-bg-from: rgba(91,79,212,0.1); --pill-active-bg-to: rgba(74,104,204,0.06);
  --entry-hover-border: #d4cec2;
  --detail-text: #4a4540; --tech-text: #4a4540;
  --scrollbar-thumb: #d4cec2;
  --sidebar-header-gradient: linear-gradient(180deg, rgba(184,148,30,0.06) 0%, transparent 100%);
  --h1-gradient: linear-gradient(135deg, #1a1815 0%, #5a5142 100%);
  --theme-icon: '☾';
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { transition: background 0.4s ease; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
  display: flex; height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased;
  transition: background 0.4s ease, color 0.4s ease;
}
::selection { background: rgba(200,168,78,0.25); color: var(--text); }

/* ── SIDEBAR ── */
#sidebar {
  width: 300px; min-width: 300px; max-width: 300px; background: var(--surface);
  border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
  transition: background 0.4s ease, border-color 0.4s ease;
}
.sidebar-header {
  padding: 22px 18px 16px; border-bottom: 1px solid var(--border);
  background: var(--sidebar-header-gradient); position: relative;
  transition: border-color 0.4s ease;
}
.sidebar-header h1 {
  font-size: 16px; font-weight: 700; letter-spacing: -0.3px;
  background: var(--h1-gradient);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.sidebar-header h1 span { color: var(--accent); -webkit-text-fill-color: var(--accent); }
.sidebar-header .subtitle { font-size: 11px; color: var(--dim); margin-top: 3px; font-weight: 400; }

/* ── THEME TOGGLE ── */
.theme-toggle-btn {
  position: absolute; top: 16px; right: 14px;
  width: 32px; height: 32px; border-radius: 50%;
  border: 1.5px solid var(--border); background: var(--surface2);
  color: var(--dim); font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s ease;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.theme-toggle-btn:hover {
  border-color: var(--accent); color: var(--accent2);
  box-shadow: 0 0 16px rgba(200,168,78,0.15);
  transform: rotate(15deg);
}
.theme-toggle-btn:active { transform: scale(0.92) rotate(0deg); }

#search-box {
  margin: 14px; padding: 11px 14px; background: var(--search-bg);
  border: 1.5px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 13px; font-family: inherit;
  outline: none; transition: all 0.3s ease;
}
#search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,168,78,0.1); }
#search-box::placeholder { color: var(--dim2); }

.category-list { flex: 1; overflow-y: auto; padding: 6px 8px; }
.cat-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 12px; cursor: pointer;
  font-size: 13px; border-radius: 6px; margin-bottom: 2px;
  transition: all 0.2s ease; color: var(--dim); font-weight: 450;
}
.cat-item:hover { background: rgba(128,128,128,0.06); color: var(--text); }
.cat-item.active {
  background: rgba(200,168,78,0.08); color: var(--accent2); font-weight: 550;
  box-shadow: inset 1px 0 0 var(--accent);
}
.cat-item .icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
.module-header {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--dim); padding: 12px 14px 8px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; gap: 8px;
  transition: all 0.2s ease; user-select: none;
  border-radius: 6px; margin: 2px 6px;
}
.module-header:hover { color: var(--accent2); background: rgba(200,168,78,0.04); }
.module-header .mod-icon { font-size: 15px; width: 22px; text-align: center; }
.module-header .mod-chevron {
  margin-left: auto; font-size: 10px; transition: transform 0.25s ease;
  opacity: 0.5;
}
.module-header.open .mod-chevron { transform: rotate(90deg); opacity: 1; }
.module-header .mod-count {
  font-size: 10px; background: var(--border); padding: 2px 8px;
  border-radius: 10px; font-weight: 500; color: var(--dim2);
}
.module-categories {
  overflow: hidden; max-height: 0; transition: max-height 0.35s ease;
}
.module-categories.open { max-height: 600px; }
.module-categories .cat-item { padding-left: 28px; }
.cat-item .count {
  margin-left: auto; font-size: 10px; background: var(--border); padding: 3px 8px;
  border-radius: 10px; font-weight: 500;
}

.sidebar-footer {
  padding: 12px 14px; border-top: 1px solid var(--border); font-size: 10px;
  color: var(--dim2); display: flex; align-items: center; gap: 8px;
  transition: border-color 0.4s ease;
}
.legend { display: flex; gap: 8px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 3px; }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ── MAIN ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); transition: background 0.4s ease; }
.toolbar {
  padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex;
  align-items: center; gap: 12px; background: var(--surface); flex-shrink: 0; flex-wrap: wrap;
  transition: background 0.4s ease, border-color 0.4s ease;
}
.toolbar .active-cat {
  font-size: 14px; font-weight: 600; white-space: nowrap;
  color: var(--text); letter-spacing: -0.2px;
}
.toolbar .result-count {
  font-size: 11px; color: var(--dim2); background: var(--feas-bg); padding: 4px 10px;
  border-radius: 10px; margin-left: auto; white-space: nowrap;
}
.feasibility-filter { display: flex; gap: 4px; background: var(--feas-bg); padding: 3px; border-radius: 8px; }
.feas-btn {
  padding: 6px 12px; border-radius: 6px; border: none; background: transparent;
  color: var(--dim); font-size: 11px; cursor: pointer; font-family: inherit;
  font-weight: 500; transition: all 0.2s ease;
}
.feas-btn:hover { color: var(--text); background: rgba(128,128,128,0.06); }
.feas-btn.active {
  background: var(--accent); color: #fff; font-weight: 600;
  box-shadow: 0 2px 8px rgba(200,168,78,0.25);
}
[data-theme="light"] .feas-btn.active { color: #fff; }

/* ── TECH PILL ── */
.tech-toggle-row { display: flex; align-items: center; margin-left: 14px; position: relative; }
.tech-pill {
  display: flex; align-items: center; gap: 8px; padding: 8px 16px;
  border-radius: 22px; cursor: pointer;
  background: linear-gradient(135deg, var(--pill-bg-from), var(--pill-bg-to));
  border: 1.5px solid var(--pill-border); font-family: inherit; font-size: 12px;
  font-weight: 600; color: var(--dim); transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  user-select: none; position: relative;
}
.tech-pill:hover { border-color: var(--purple); color: var(--text2); box-shadow: 0 0 20px rgba(139,124,240,0.1); }
.tech-pill.active {
  background: linear-gradient(135deg, var(--pill-active-bg-from), var(--pill-active-bg-to));
  border-color: var(--purple); color: var(--purple);
  box-shadow: 0 0 28px rgba(139,124,240,0.18), inset 0 1px 0 rgba(255,255,255,0.04);
}
.tech-pill .pill-icon { font-size: 15px; transition: transform 0.3s; }
.tech-pill.active .pill-icon { transform: rotate(12deg); }
.tech-pill .pill-indicator {
  width: 8px; height: 8px; border-radius: 50%; background: var(--border2); transition: all 0.3s;
}
.tech-pill.active .pill-indicator { background: var(--purple); box-shadow: 0 0 10px var(--purple); }
.tech-pill .pill-badge {
  position: absolute; top: -7px; right: -6px;
  background: var(--purple); color: #fff; font-size: 8px; font-weight: 700;
  padding: 2px 7px; border-radius: 8px; letter-spacing: 0.5px;
  animation: pulse-badge 2.5s ease-in-out infinite;
}
@keyframes pulse-badge {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.85; transform: scale(1.06); }
}

/* ── CONTENT ── */
#content { flex: 1; overflow-y: auto; padding: 24px 24px 24px 20px; }
#content::-webkit-scrollbar { width: 6px; }
#content::-webkit-scrollbar-track { background: transparent; }
#content::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

.entry {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 18px 22px; margin-bottom: 10px; transition: all 0.2s ease; cursor: pointer;
  position: relative;
}
.entry:hover { border-color: var(--entry-hover-border); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
.entry.expanded {
  border-color: var(--accent); box-shadow: var(--shadow-md), 0 0 0 1px rgba(200,168,78,0.1);
}
.entry-header { display: flex; align-items: flex-start; gap: 16px; }
.feasibility-badge {
  width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center;
  justify-content: center; font-size: 15px; flex-shrink: 0; margin-top: 1px; font-weight: 700;
}
.feasibility-badge.green { background: rgba(63,185,107,0.12); color: var(--green); }
.feasibility-badge.amber { background: rgba(212,164,52,0.12); color: var(--amber); }
.feasibility-badge.orange { background: rgba(224,123,60,0.12); color: var(--orange); }
.feasibility-badge.red { background: rgba(224,81,81,0.12); color: var(--red); }

.entry-body { flex: 1; min-width: 0; }
.entry-question { font-size: 14px; font-weight: 600; line-height: 1.45; margin-bottom: 4px; letter-spacing: -0.15px; }
.entry-subtitle { font-size: 11px; color: var(--dim); margin-bottom: 8px; font-weight: 450; }
.entry-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
.tag {
  font-size: 10px; padding: 3px 9px; border-radius: 4px; font-weight: 500;
  background: var(--tag-bg); color: var(--blue); border: 1px solid var(--tag-border);
}
.tag.green { background: rgba(63,185,107,0.08); color: var(--green); border-color: rgba(63,185,107,0.12); }
.tag.amber { background: rgba(212,164,52,0.08); color: var(--amber); border-color: rgba(212,164,52,0.12); }
.tag.orange { background: rgba(224,123,60,0.08); color: var(--orange); border-color: rgba(224,123,60,0.12); }
.tag.red { background: rgba(224,81,81,0.08); color: var(--red); border-color: rgba(224,81,81,0.12); }

/* ── EXPANDED ── */
.entry-detail { display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); transition: border-color 0.4s ease; }
.entry.expanded .entry-detail { display: block; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.entry-detail h4 {
  font-size: 11px; color: var(--accent2); text-transform: uppercase; letter-spacing: 0.6px;
  margin: 16px 0 6px; font-weight: 600;
}
.entry-detail h4:first-child { margin-top: 0; }
.entry-detail p { font-size: 13px; line-height: 1.65; color: var(--detail-text); margin-bottom: 8px; }

/* ── TECH SECTION ── */
.tech-section {
  display: none; margin-top: 14px; padding: 16px 18px; background: var(--tech-bg);
  border-radius: 8px; border-left: 3px solid var(--tech-border);
  box-shadow: inset 0 1px 0 rgba(128,128,128,0.04);
  transition: background 0.4s ease;
}
.tech-visible .tech-section { display: block; animation: fadeIn 0.25s ease; }
.tech-section h4 { color: var(--purple); font-size: 11px; letter-spacing: 0.6px; margin-bottom: 10px; }
.tech-section ol { margin: 0 0 0 18px; font-size: 12px; color: var(--tech-text); line-height: 1.8; }
.tech-section ol li { margin-bottom: 5px; padding-left: 2px; }
.tech-section ol li::marker { color: var(--purple); font-weight: 600; }
.tech-section code {
  background: rgba(139,124,240,0.1); color: var(--purple); padding: 2px 7px; border-radius: 4px;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11px; font-weight: 500;
}
.tech-section .source { font-size: 10px; color: var(--dim2); margin-top: 12px; font-style: italic; }

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 10px; }
.detail-item { font-size: 12px; }
.detail-item label {
  color: var(--dim); display: block; font-size: 9px; text-transform: uppercase;
  letter-spacing: 0.6px; margin-bottom: 2px; font-weight: 600;
}
.detail-item .value { font-weight: 600; color: var(--text); }
.expand-hint {
  font-size: 11px; color: var(--accent2); cursor: pointer; margin-top: 6px;
  display: inline-block; font-weight: 500; transition: color 0.15s;
}
.expand-hint:hover { color: var(--accent); }

/* ── CLIENT QUERY INPUT ── */
.query-panel {
  margin: 0 20px 16px 20px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px;
  transition: background 0.4s ease, border-color 0.4s ease;
}
.query-panel label {
  font-size: 11px; font-weight: 700; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; display: block;
}
.query-panel textarea {
  width: 100%; background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 8px; color: var(--text); font-family: inherit; font-size: 13px;
  padding: 10px 14px; resize: vertical; min-height: 56px; max-height: 140px;
  outline: none; transition: border-color 0.3s ease; line-height: 1.5;
}
.query-panel textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,168,78,0.1); }
.query-panel textarea::placeholder { color: var(--dim2); }
.query-panel .query-hint {
  font-size: 10px; color: var(--dim2); margin-top: 6px; display: flex; justify-content: space-between; align-items: center;
}
.query-match-count { color: var(--accent2); font-weight: 600; }

.empty-state { text-align: center; padding: 80px 20px; color: var(--dim); }
.empty-state .icon { font-size: 52px; margin-bottom: 20px; opacity: 0.6; }
.empty-state h3 { font-size: 17px; color: var(--text); margin-bottom: 8px; font-weight: 600; }
.empty-state p { font-size: 13px; color: var(--dim2); max-width: 400px; margin: 0 auto; line-height: 1.6; }

@media (max-width: 768px) {
  body { flex-direction: column; }
  #sidebar { width: 100%; min-width: 0; max-height: 40vh; }
  #main { flex: 1; }
  .detail-grid { grid-template-columns: 1fr; }
  .toolbar { gap: 8px; padding: 10px 14px; }
  #content { padding: 14px; }
  .theme-toggle-btn { top: 10px; right: 10px; }
}
</style>
</head>
<body>

<div id="sidebar">
  <div class="sidebar-header">
    <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle light/dark theme" aria-label="Toggle theme">☀</button>
    <h1><span>SF</span> Compass</h1>
    <div class="subtitle">94 scenarios · 8 SF modules</div>
  </div>
  <input type="text" id="search-box" placeholder="Search by keyword, tag, or topic..." oninput="filterEntries()">
  <div class="category-list" id="category-list"></div>
  <div class="sidebar-footer">
    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:var(--green)"></span> Full</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--amber)"></span> Partial</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--orange)"></span> Wknd</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--red)"></span> Limited</div>
    </div>
    <div style="font-size:10px">SF Compass · 94 items</div>
  </div>
</div>

<div id="main">
  <div class="query-panel" id="query-panel">
    <label>🎯 Client Query / Issue</label>
    <textarea id="client-query" placeholder="Paste your client's question or issue here... e.g., 'Client wants matrix reporting for UK team plus country-specific statutory fields for Germany and France'"></textarea>
    <div class="query-hint">
      <span>Matches across all 94 scenarios automatically as you type</span>
      <span class="query-match-count" id="query-match-count"></span>
    </div>
  </div>
  <div class="toolbar">
    <span class="active-cat" id="active-cat-label">All Modules</span>
    <span class="result-count" id="result-count"></span>
    <div class="feasibility-filter" id="feas-filter">
      <button class="feas-btn active" data-feas="all" onclick="setFeasFilter('all', this)">All</button>
      <button class="feas-btn" data-feas="green" onclick="setFeasFilter('green', this)">Full</button>
      <button class="feas-btn" data-feas="amber" onclick="setFeasFilter('amber', this)">Partial</button>
      <button class="feas-btn" data-feas="orange" onclick="setFeasFilter('orange', this)">Wknd</button>
      <button class="feas-btn" data-feas="red" onclick="setFeasFilter('red', this)">Limited</button>
    </div>
    <div class="tech-toggle-row">
      <div class="tech-pill" id="tech-pill" onclick="toggleTechDetails()">
        <span class="pill-icon">⚙</span>
        <span id="tech-label">Implementation Steps</span>
        <span class="pill-indicator"></span>
        <span class="pill-badge">PRO</span>
      </div>
    </div>
  </div>
  <div id="content"></div>
</div>

<script>
const CATEGORIES = [
