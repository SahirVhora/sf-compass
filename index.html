    q:'Can we add emergency contact fields and make them mandatory?',
    s:'EC has a standard Emergency Contact portlet. It supports multiple contacts per employee. You can make it mandatory via business rules.',
    approach:'Enable the Emergency Contact portlet in People Profile. Add a business rule that validates at least one contact exists before allowing certain transactions.',
    tags:['Emergency Contacts'],
    tech:`<ol><li>Enable the <b>Emergency Contacts</b> portlet in <code>Configure People Profile</code></li><li>Employees can add contacts via self-service — name, relationship, phone numbers, address</li><li>To enforce mandatory contact: create an <b>onSave</b> rule on Job Info that counts the employee's emergency contacts and raises an error if count = 0</li><li>Alternative: use the <b>People Profile completeness</b> configuration to flag missing emergency contacts on the employee's homepage</li></ol><div class="source">Source: SAP SF Implementation Workbook — People Profile Configuration (Lesson 6.2)</div>`
  },

  // ═══ BUSINESS RULES ═══
  { cat:'rules', f:'green', level:'Business Rules',
    q:'Can we auto-populate fields based on other fields — like setting cost center from department?',
    s:'Yes, the most common use of business rules. OnSave/onChange rules can read the department, look up its default cost center, and auto-populate.',
    approach:'Create an onChange rule on the HRIS element. Use Set Field actions to populate derived fields referencing FO data.',
    tags:['Auto-Population','Defaulting'],
    tech:`<ol><li>Create a new rule in <code>Admin Center → Configure Business Rules</code></li><li>Set <b>Rule Type = onChange</b>, <b>Base Object = Job Information</b>, <b>Trigger Field = Department</b></li><li>Add an <b>If</b> condition: <code>Job Information.Department is not null</code></li><li>Inside the If: <code>Set Field → Job Information.Cost Center = Job Information.Department.Default Cost Center</code></li><li>The path expression traverses the association: Employee → Job Info → Department FO → reads the "Default Cost Center" field from the Department record</li><li>Assign the rule to Job Info in <code>Manage Business Configuration</code></li><li>Test: change the Department on an employee → Cost Center should auto-populate immediately</li></ol><div class="source">Source: SAP SF Implementation Workbook — Business Rules (Lesson 5.3)</div>`
  },
  { cat:'rules', f:'green', level:'Business Rules',
    q:'Can we validate that two fields are consistent — like pay grade matching job code?',
    s:'Yes, business rules can compare any fields and raise validation errors for cross-field consistency checks.',
    approach:'Create an onSave rule. Use Raise Error when fields are inconsistent. The error blocks save until the conflict resolves.',
    tags:['Validation','Cross-Field'],
    tech:`<ol><li>Create an <b>onSave</b> rule on <b>Job Information</b></li><li>Add an <b>If</b> condition: <code>Job Information.Pay Grade does not match Job Information.Job Code.Valid Pay Grades</code></li><li>Inside the If: <b>Raise Error</b> with a user-friendly message like "The selected Pay Grade is not valid for this Job Code. Please choose from the allowed pay grades."</li><li>The rule can reference a picklist, an associated FO, or a lookup table to determine valid combinations</li><li>Optionally add a <b>Warn</b> action instead of <b>Raise Error</b> for soft validation (user can override after seeing the warning)</li></ol><div class="source">Source: SAP SF Implementation Workbook — Validation Rules (Lesson 5.4)</div>`
  },
  { cat:'rules', f:'green', level:'Business Rules',
    q:'Can business rules reference data from Foundation Objects during employee data entry?',
    s:'Yes, rules can traverse associations from the employee → department → location → legal entity and read any field on those objects.',
    approach:'Use path expressions like Employee.Job Information.Department.Cost Center to traverse object relationships.',
    tags:['FO Lookups'],
    tech:`<ol><li>In the business rule, use the <b>Path Browser</b> to explore available associations from the base object</li><li>Full path example: <code>Job Information.Department.Location.Legal Entity.Country</code></li><li>Each "dot" in the path follows an association defined in the object model</li><li>Rules can read any field on the final object in the chain (String, Number, Date, Boolean, Picklist — all supported)</li><li>Limitation: rules can read from one-to-one associations directly. For one-to-many associations, use <b>For Each</b> loops</li></ol><div class="source">Source: SAP SF Implementation Workbook — Business Rule Path Expressions (Lesson 5.5)</div>`
  },
  { cat:'rules', f:'green', level:'Business Rules',
    q:'Can we trigger a business rule only for specific countries or employee groups?',
    s:'Yes, rules can be scoped by country, legal entity, employee class, or any field. One HRIS element can have multiple rules, each targeting different populations.',
    approach:'Add an If condition at the top of the rule checking country, legal entity, or other attributes. Only matching records execute the rule.',
    tags:['Rule Scoping'],
    tech:`<ol><li>In the business rule, add an <b>If</b> block as the first action</li><li>Set the condition: <code>Job Information.Country = "France"</code> or <code>Employee Class = "Employee"</code></li><li>Place all subsequent actions inside this If block — they only execute when the condition is true</li><li>Add <b>Else If</b> blocks for additional countries/groups with different logic</li><li>Assign all rules to the same HRIS element in <code>Manage Business Configuration</code>. Each rule evaluates independently — only the one matching the condition fires</li></ol><div class="source">Source: SAP SF Implementation Workbook — Rule Scoping (Lesson 5.1)</div>`
  },
  { cat:'rules', f:'amber', level:'Business Rules + Workflow',
    q:'Can business rules send email notifications when certain conditions are met?',
    s:'Yes, rules can trigger email via "Send Email" action, but options are limited. For richer notifications, use workflow rules instead.',
    approach:'For simple alerts: use Send Email in business rules. For structured notifications with templates, routing, and escalation: create a workflow.',
    tags:['Notifications'],
    tech:`<ol><li>For simple email: in the business rule, add a <b>Send Email</b> action. Configure: recipient (by role/relationship/email), subject, and body (plain text only)</li><li>Limitation of Send Email in business rules: no HTML formatting, no attachments, no CC/BCC, limited recipient resolution</li><li>For professional notifications: create a <b>Workflow</b> instead. Add an <b>Email Step</b> with full HTML template, CC/BCC, and attachment support</li><li>Trigger the workflow from the business rule using <b>Trigger Workflow</b> action, or configure the workflow to trigger directly on record save</li></ol><div class="source">Source: SAP SF Implementation Workbook — Notifications & Workflows (Lesson 7.3)</div>`
  },
  { cat:'rules', f:'orange', level:'Workaround',
    q:'Can we create rules that run on a schedule — like a daily check for expiring visas?',
    s:'Business rules only fire on user-triggered events (save, change, import). Scheduled execution requires Integration Center with ODATA.',
    approach:'Build an Integration Center job that queries employees with expiring records and outputs a report or email. Schedule it to run daily.',
    tags:['Scheduled Rules','Integration Center'],
    tech:`<ol><li>Go to <code>Admin Center → Integration Center</code> → <b>Create New Integration</b></li><li>Select <b>ODATA</b> as the source type. Build a query filtering employees where <code>visaExpiryDate ≤ Today + 30 days</code></li><li>Add the desired output fields: employee name, ID, visa type, expiry date, manager email</li><li>Set destination: <b>Email</b> → configure the recipient list (HR team, managers)</li><li>Schedule the integration: daily at 6:00 AM. The integration runs server-side without any user action</li><li>Limitation: this is read-only notification. Automatically updating records (e.g., setting a status flag) on schedule is not possible without external orchestration</li></ol><div class="source">Source: SAP SF Implementation Workbook — Integration Center (Lesson 9.4)</div>`
  },
  { cat:'rules', f:'green', level:'Business Rules',
    q:'Can we default the pay frequency based on the country selected on Job Info?',
    s:'Yes, standard use case for onChange business rules. When country changes, the rule sets the appropriate pay frequency.',
    approach:'Create an onChange rule triggered by the Country field. Use If/Else conditions to set pay frequency by country.',
    tags:['Defaulting','Country Logic'],
    tech:`<ol><li>Create a new business rule with <b>Rule Type = onChange</b>, <b>Base Object = Job Information</b>, <b>Trigger Field = Country</b></li><li>Add <b>If</b> blocks for each country: <code>If Country = "UK" → Set Pay Frequency = "Monthly"</code>, <code>If Country = "Germany" → Set Pay Frequency = "Monthly"</code>, <code>If Country = "USA" → Set Pay Frequency = "Bi-Weekly"</code></li><li>Assign the rule to the Job Information HRIS element. When a user changes country, pay frequency auto-updates</li><li>If the user manually overrides pay frequency, you can add a second rule or condition to respect manual overrides</li></ol><div class="source">Source: SAP SF Implementation Workbook — Business Rules (Lesson 5.7)</div>`
  },

  // ═══ WORKFLOWS & APPROVALS ═══
  { cat:'workflow', f:'green', level:'Workflow Configuration',
    q:'Can we set up custom approval workflows for employee data changes?',
    s:'Yes, standard workflow capability. Define workflow groups, steps, and approval chains for Job Info changes, compensation, and personal data.',
    approach:'Create a workflow definition. Add approval steps. Configure dynamic approver determination based on employee attributes.',
    tags:['Approvals','Manager Approval'],
    tech:`<ol><li>Go to <code>Admin Center → Manage Workflow Groups</code> → <b>Create New Group</b></li><li>Define the group: name (e.g., "Job Info Changes"), base object (Job Information), and trigger event (onSave)</li><li>Add a <b>Workflow Step</b> of type <b>Approval</b>. Set the approver: Manager, HR Manager, Role-based, or Rule-based</li><li>For rule-based approvers: create a business rule that returns the approver's user ID based on the employee's department, job level, or location</li><li>Configure step settings: timeout (auto-approve after N days), escalation, and whether the approver can delegate</li><li>Attach the workflow group to the HRIS element in <code>Manage Business Configuration</code> → select the workflow under the element's workflow assignment</li></ol><div class="source">Source: SAP SF Implementation Workbook — Workflow Configuration (Lesson 7.1)</div>`
  },
  { cat:'workflow', f:'green', level:'Workflow Configuration',
    q:'Can we have dynamic approver routing based on department or type of change?',
    s:'Yes, dynamic approver determination is a core workflow feature. Route to different people based on department, job level, or any field value.',
    approach:'Define Dynamic Approver rules using business rules. Different conditions can route to different approvers.',
    tags:['Dynamic Routing'],
    tech:`<ol><li>In the workflow step, set <b>Approver Determination = Rule-based</b></li><li>Create a business rule of type <b>Workflow Step Approver</b></li><li>In the rule: add If conditions based on the employee's attributes. Example: <code>If Department = "Engineering" → return VP Engineering user ID</code>, <code>Else → return HR Director user ID</code></li><li>The rule must return a valid user ID. Use the <b>Return</b> action with the user lookup</li><li>Assign this rule to the workflow step in the workflow group configuration</li></ol><div class="source">Source: SAP SF Implementation Workbook — Dynamic Approver Rules (Lesson 7.2)</div>`
  },
  { cat:'workflow', f:'green', level:'Workflow Configuration',
    q:'Can we configure multi-step workflows — manager → HR → department head?',
    s:'Yes, multi-step workflows are standard. Each step has its own approver rules, timeouts, and escalation paths.',
    approach:'Define sequenced workflow steps. Set approvers, timeouts, and escalation (auto-approve, escalate, or send reminder) per step.',
    tags:['Multi-Step','Escalation'],
    tech:`<ol><li>In the workflow group, add multiple steps in sequence</li><li>Step 1: <b>Manager Approval</b> — approver = Direct Manager, timeout = 3 days, escalate to next step on timeout</li><li>Step 2: <b>HR Review</b> — approver = HR Manager (role-based), timeout = 2 days</li><li>Step 3: <b>Department Head Approval</b> — approver = rule-based (returns department head via FO lookup)</li><li>For each step, configure: <b>On Timeout</b> behavior (Auto-Approve, Auto-Reject, Escalate, or Do Nothing)</li><li>Add <b>Notification Steps</b> between approval steps to inform stakeholders without requiring action</li></ol><div class="source">Source: SAP SF Implementation Workbook — Multi-Step Workflows (Lesson 7.4)</div>`
  },
  { cat:'workflow', f:'green', level:'User Setting',
    q:'Can employees delegate workflow approvals when out of office?',
    s:'Yes, delegation is standard. Users set up delegation periods with dates and specify which workflows to delegate.',
    approach:'Each user enables delegation from their profile settings. No admin configuration needed.',
    tags:['Delegation'],
    tech:`<ol><li>User navigates to: <b>Profile → Settings → Workflow Delegation</b></li><li>Clicks <b>Add Delegation Period</b></li><li>Selects: delegate (who will approve on their behalf), start/end dates, and which workflow types to delegate</li><li>The delegate receives an automatic notification. During the period, all specified workflows route to the delegate instead</li><li>Audit trail: the approval record shows "Approved by [Delegate] on behalf of [Original Approver]"</li><li>Admin monitoring: use <code>Manage Workflow Delegation</code> report in Report Center to view all active delegations</li></ol><div class="source">Source: SAP SF Standard — Workflow Delegation (no admin config required)</div>`
  },
  { cat:'workflow', f:'green', level:'Workflow Configuration',
    q:'Can workflows send notifications to non-approvers — like informing HR when a change completes?',
    s:'Yes, workflows can include "Notify" steps. Notifications go to anyone: roles, individuals, or distribution lists.',
    approach:'Add a Send Notification step after the final approval. Configure recipients by role, relationship, or email.',
    tags:['Notifications','CC'],
    tech:`<ol><li>In the workflow group, add a step of type <b>Send Notification</b></li><li>Place it after the final approval step in the sequence</li><li>Configure recipients: by role (HR Manager, Payroll Admin), by relationship (employee's HRBP), or by fixed email</li><li>Set the email template: subject, body (supports HTML and field placeholders like <code>{{Employee.Name}}</code>, <code>{{Effective.Date}}</code>)</li><li>The notification fires automatically when the prior approval step completes — no user action triggers it</li></ol><div class="source">Source: SAP SF Implementation Workbook — Workflow Notifications (Lesson 7.5)</div>`
  },
  { cat:'workflow', f:'green', level:'Standard',
    q:'Can we track the full history of who approved what and when — for audit?',
    s:'Every workflow step logs: who acted, what action they took, timestamp, and comments. Available in Workflow Audit Report.',
    approach:'Use the standard Workflow Audit report. Each approval/rejection/timeout is logged with full details. On by default.',
    tags:['Audit Trail'],
    tech:`<ol><li>Navigate to <code>Report Center → Workflow Audit Report</code></li><li>Filter by: employee, workflow type, date range, approver, or status (approved/rejected/timeout)</li><li>The report shows: request date, approver, action, timestamp, comments, and delegation status</li><li>For per-record view: open the employee's Job Info → <b>Change History</b> tab → each change shows the associated workflow approval trail</li><li>Data retention: workflow audit data follows the standard SF data retention policy (configured in <code>Data Retention Management</code>)</li></ol><div class="source">Source: SAP SF Standard — Workflow Audit (on by default, no config needed)</div>`
  },

  // ═══ EVENT REASONS ═══
  { cat:'events', f:'green', level:'Configuration',
    q:'Can we create custom event reasons beyond standard ones like Hire, Transfer, Termination?',
    s:'The event reason picklist is fully extensible. Add reasons like "Rehire - Boomerang", "Transfer - Project Assignment", or "Termination - Mutual Agreement".',
    approach:'Add values to the event reason picklist. Map each reason to the parent event for correct system behavior.',
    tags:['Event Reasons','Picklists'],
    tech:`<ol><li>Go to <code>Admin Center → Manage Data</code> → search for <b>Picklist</b> → find the <code>eventReason</code> picklist</li><li>Click <b>Add Value</b>. Enter the new reason (e.g., <code>Rehire - Boomerang</code>) and its external code</li><li>Set the <b>Parent Event</b> mapping: Hire, Transfer, Termination, Data Change, etc. This determines how the system treats the record</li><li>For the label: use the language pack or direct label override to set display text in each supported language</li><li>Test: create a new employee using the custom event reason → verify the record appears correctly in reports and the event derivation table</li></ol><div class="source">Source: SAP SF Implementation Workbook — Event Reasons (Lesson 4.1)</div>`
  },
  { cat:'events', f:'green', level:'Configuration',
    q:'Can we set up event derivation so the correct event reason auto-populates based on what changed?',
    s:'Yes, this is core configuration. Event derivation rules determine which event and reason apply based on changed fields.',
    approach:'Configure rules in Manage Data → Event Derivation. Define conditions for each change scenario and map to event reasons.',
    tags:['Event Derivation'],
    tech:`<ol><li>Go to <code>Admin Center → Manage Data</code> → search for <b>Event Derivation</b></li><li>The event derivation table lists every possible field-change combination. Each row maps: changed field(s) → event + event reason</li><li>Add a new row: select the changed field (e.g., <code>Department</code>), then select the event (<code>Transfer</code>) and event reason (<code>Transfer - Department Change</code>)</li><li>For multi-field changes: add rows where multiple conditions are checked. The first matching row wins</li><li>Test thoroughly with a matrix of your change scenarios. A missed row means the system uses the fallback event, which may not be what you want</li></ol><div class="source">Source: SAP SF Implementation Workbook — Event Derivation (Lesson 4.2)</div>`
  },
  { cat:'events', f:'green', level:'Workflow Configuration',
    q:'Can we trigger different workflows depending on the event reason selected?',
    s:'Yes, workflows can associate with specific event reasons. Different event reasons can have completely different approval chains.',
    approach:'In the workflow definition, set the triggering event reason. Each reason can point to a different workflow group.',
    tags:['Conditional Workflows'],
    tech:`<ol><li>Create separate workflow groups for each scenario (e.g., <code>Transfer_Global</code>, <code>Transfer_DeskMove</code>)</li><li>In each workflow group, under <b>Trigger Configuration</b>, set the <b>Event Reason</b> to the specific reason</li><li>The "Transfer - Global Move" workflow might have 4-step approval; "Transfer - Desk Move" might auto-approve</li><li>In <code>Manage Business Configuration</code>, attach all workflow groups to the HRIS element. The system selects the correct one based on the event reason chosen by the user</li></ol><div class="source">Source: SAP SF Implementation Workbook — Workflow & Events (Lesson 7.6)</div>`
  },
  { cat:'events', f:'orange', level:'Workaround',
    q:'Can we restrict which event reasons are available to certain user groups?',
    s:'Event reason visibility is not directly permission-controlled. Workaround: use business rules to block unauthorized users from selecting restricted reasons.',
    approach:'Create an onSave rule that checks the user\'s role against the selected event reason. Block save with an error if not authorized.',
    tags:['Restrictions'],
    tech:`<ol><li>Create an <b>onSave</b> business rule on the relevant HRIS element</li><li>In the rule: check the logged-in user's role (via <code>Get User Role</code> function or by checking permission group membership)</li><li>Add condition: <code>If Event Reason = "Termination - Involuntary" AND User Role ≠ "HR Director" Then Raise Error</code></li><li>This blocks the save but does NOT hide the option from the picklist — users will see the restricted reasons but cannot use them</li><li>For a cleaner UX, also create a separate picklist filtered by role via a custom MDF UI, but this adds significant complexity</li></ol><div class="source">Source: SAP SF Community — Event Reason Restriction Pattern (KB 2984632)</div>`
  },

  // ═══ UI & SELF-SERVICE ═══
  { cat:'ui', f:'green', level:'Configuration',
    q:'Can we customize the People Profile — rearrange portlets, change labels, hide sections?',
    s:'People Profile is fully configurable. Rearrange portlets, rename sections, create custom portlets, and control visibility by role using RBP.',
    approach:'Use Configure People Profile for layout. Set label overrides in language packs. Use RBP to show/hide portlets per role.',
    tags:['People Profile','Portlets'],
    tech:`<ol><li>Go to <code>Admin Center → Configure People Profile</code></li><li>Drag-and-drop portlets into the desired order. Portlets can be grouped under collapsible sections</li><li>To rename a portlet: use <code>Language Pack</code> tool → find the portlet label key → override the text</li><li>To hide a portlet for certain roles: configure <b>Portlet Visibility</b> via RBP. In <code>Manage Permission Roles</code> → People Profile permissions → uncheck portlets the role should not see</li><li>To create a custom portlet: use <code>Configure Object Definitions</code> to build a custom MDF object, then expose it as a portlet in People Profile configuration</li></ol><div class="source">Source: SAP SF Implementation Workbook — People Profile Configuration (Lesson 6.1)</div>`
  },
  { cat:'ui', f:'amber', level:'Configuration + Custom',
    q:'Can we add custom buttons or quick actions to the People Profile?',
    s:'You can add custom action buttons that trigger workflows, navigate to URLs, or launch custom apps. Rich interactive elements need custom development.',
    approach:'Add "Take Action" links in portlet configuration. These trigger workflows or open URLs. For richer interactivity, use custom MDF UIs.',
    tags:['Custom Actions','UX'],
    tech:`<ol><li>In <code>Configure People Profile</code>, open a portlet's settings</li><li>Under <b>Actions</b>, add a <b>Take Action</b> link. Configure: label, visibility (always/conditional), and destination</li><li>Destination options: trigger a workflow, navigate to a URL (internal or external), or open a custom application (custom tile)</li><li>For modal-based actions (pop-up forms): build a <b>Custom MDF UI</b> via <code>Configure Object Definitions</code> → <b>UI</b> tab → define the form layout and actions</li><li>Custom MDF UIs can include: input fields, dropdowns, date pickers, and submit buttons. The UI can trigger business rules on submit</li></ol><div class="source">Source: SAP SF Implementation Workbook — Custom Actions & MDF UIs (Lesson 6.3)</div>`
  },
  { cat:'ui', f:'amber', level:'Theme Configuration',
    q:'Can we customize the look and feel — company colors, logo, branding?',
    s:'SF supports theme configuration (logo, primary color, background). Full CSS customization is not available — this is SaaS with a controlled UI framework.',
    approach:'Use Theme Manager to set logo, colors, and background. Deep UI changes are not supported.',
    tags:['Branding','Theming'],
    tech:`<ol><li>Go to <code>Admin Center → Company Settings → Theme Manager</code></li><li>Upload company logo: recommended size 200×60px, PNG format with transparency</li><li>Set primary color (hex code) — this affects headers, buttons, and accent elements throughout the UI</li><li>Set background: choose from predefined patterns or upload an image (max file size 2MB)</li><li>Preview the theme before publishing. Changes apply to all users across the entire instance</li><li>Limitation: font family, card border radius, spacing, and detailed CSS-level customizations are not available. This is a multi-tenant SaaS product — the UI chrome is shared</li></ol><div class="source">Source: SAP SF Implementation Workbook — Branding & Theming (Lesson 6.4)</div>`
  },
  { cat:'ui', f:'orange', level:'Custom Development',
    q:'Can we build a custom landing page dashboard for employees?',
    s:'The standard homepage shows tiles. A fully custom dashboard requires SAP Analytics Cloud or custom tile development.',
    approach:'For basic: configure homepage tiles. For rich dashboards: use SAP Analytics Cloud with SF data, or develop a custom tile with embedded content.',
    tags:['Dashboard','Homepage'],
    tech:`<ol><li>Basic: configure homepage tiles via <code>Admin Center → Manage Homepage</code>. Available tiles: Quick Actions, To-Do, Important Links, Reports, Custom Tiles</li><li>Custom Tile: build via <code>Admin Center → Manage Tiles</code> → create a custom tile that embeds an external URL in an iframe. The external page can be a dashboard built in any web technology, pulling SF data via ODATA API</li><li>SAP Analytics Cloud: provision SAC, connect to SF via the standard connector, build SAC stories and pin them to the SF homepage as tiles</li><li>Note: custom tiles require hosting the embedded page on a secure (HTTPS) server accessible to all SF users</li></ol><div class="source">Source: SAP SF Implementation Workbook — Homepage & Tiles (Lesson 6.5)</div>`
  },
  { cat:'ui', f:'green', level:'RBP Configuration',
    q:'Can we hide certain menu items from employees who do not need them?',
    s:'Navigation visibility is controlled by RBP permissions. Menu items only appear if the user has the relevant permission grant.',
    approach:'Review permission roles. Remove permission grants for modules the role should not access. The navigation adjusts automatically.',
    tags:['Navigation','Permissions'],
    tech:`<ol><li>Go to <code>Admin Center → Manage Permission Roles</code> → open the target role</li><li>Under <b>Permission Grants</b>, review all grants for modules (Recruiting, Onboarding, Learning, Compensation, etc.)</li><li>Remove grants for modules the role should not see. For example: if employees should not access Recruiting, remove the "Recruiting Access" grant</li><li>The navigation updates immediately — removed modules disappear from the user's main menu</li><li>Use <code>Permission Debug</code> tool to verify a specific user sees only the intended menu items</li></ol><div class="source">Source: SAP SF Implementation Workbook — RBP Configuration (Lesson 8.2)</div>`
  },

  // ═══ REPORTING & ANALYTICS ═══
  { cat:'reporting', f:'green', level:'Report Center',
    q:'Can we build reports combining EC data with other SF modules like Recruiting or Learning?',
    s:'Report Center supports cross-module reporting. Create reports that join Employee Central with Recruiting, Onboarding, Performance, Learning, and Compensation.',
    approach:'Use Report Center → Create Report → Cross Module data source. Build queries joining people data across modules.',
    tags:['Cross-Module','Joined Reports'],
    tech:`<ol><li>Go to <code>Report Center</code> → <b>Create Report</b></li><li>Select <b>Cross Module</b> as the data source type</li><li>Choose the modules to include: EC (always), plus RCM, ONB, LMS, PMGM, COMP, etc.</li><li>Build the query in the visual editor: select columns from each module, define joins (auto-joined on Person ID), add filters and sorting</li><li>Run the report to verify results. Save and share with appropriate permissions</li><li>Cross-module reports use the <b>Analytics Data Store</b> — data is replicated periodically, not live. Expect a latency of 2-6 hours depending on your tenant's replication schedule</li></ol><div class="source">Source: SAP SF Implementation Workbook — Report Center (Lesson 10.1)</div>`
  },
  { cat:'reporting', f:'green', level:'Report Center',
    q:'Can we schedule reports to run automatically and be emailed to a distribution list?',
    s:'Yes. Reports can be scheduled with daily/weekly/monthly recurrence and emailed to recipients.',
    approach:'In Report Center, open the report → Schedule → set frequency, format, and recipients. Reports run server-side and deliver automatically.',
    tags:['Scheduling','Distribution'],
    tech:`<ol><li>Open the report in <code>Report Center</code></li><li>Click <b>Schedule</b> in the report toolbar</li><li>Set: frequency (Daily/Weekly/Monthly), time of day, output format (PDF/Excel/CSV), and recipient list (by role, email, or distribution list)</li><li>Optional: add a <b>bursting</b> configuration — the report splits by a field (e.g., Department) and each manager only receives their own slice</li><li>Monitor scheduled reports: <code>Admin Center → Scheduled Job Manager</code> shows all schedules, next run times, and failure logs</li></ol><div class="source">Source: SAP SF Implementation Workbook — Report Scheduling (Lesson 10.3)</div>`
  },
  { cat:'reporting', f:'green', level:'Report Center',
    q:'Can we create reports that include custom HRIS fields added to Job Info?',
    s:'All custom HRIS fields are automatically available in Report Center as reportable columns.',
    approach:'When building a report, custom fields appear alongside standard fields in the column picker.',
    tags:['Custom Fields'],
    tech:`<ol><li>When creating a report, in the <b>Column Selection</b> step, expand the HRIS element (e.g., Job Information)</li><li>Custom fields are listed under a "Custom Fields" subsection — same picker as standard fields</li><li>If a custom field does NOT appear: check that it is marked as <b>Reportable = Yes</b> in <code>Manage Business Configuration</code> → field properties</li><li>Newly added custom fields may take up to 24 hours to appear in the Analytics Data Store (reporting data source)</li></ol><div class="source">Source: SAP SF Implementation Workbook — Report Center Custom Fields (Lesson 10.2)</div>`
  },
  { cat:'reporting', f:'green', level:'Standard + Report Center',
    q:'Can we build an organizational chart report showing the full hierarchy?',
    s:'The standard Org Chart tool provides visual hierarchy. For tabular reports, use Report Center with Direct Reports join paths.',
    approach:'For visual: use the Org Chart from People Profile. For tabular: build a Report Center report using hierarchy expansion.',
    tags:['Org Chart','Hierarchy'],
    tech:`<ol><li>Visual org chart: navigate to any employee → <b>Org Chart</b> tab. Shows direct reports and can expand down/up the hierarchy</li><li>For tabular report: in Report Center, create a report on <b>Employee Profile</b></li><li>Add columns: Name, Position, Manager Name, Department, Job Code</li><li>To expand hierarchy generations: use the <b>Hierarchy</b> join type and set the number of levels to expand (e.g., 5 levels down from a starting manager)</li><li>Filter to a specific manager's org: <code>Manager = [specific manager name]</code> or use the logged-in user's context</li></ol><div class="source">Source: SAP SF Implementation Workbook — Organizational Reporting (Lesson 10.4)</div>`
  },
  { cat:'reporting', f:'amber', level:'SAP Analytics Cloud Required',
    q:'Can we create real-time dashboards that update as data changes?',
    s:'Report Center provides reports, not live dashboards. For real-time dashboards, you need SAP Analytics Cloud connected to SF.',
    approach:'Provision SAC and connect to SF. Build SAC stories with live or scheduled data refresh.',
    tags:['Dashboards','SAC'],
    tech:`<ol><li>Provision SAP Analytics Cloud tenant. Obtain the SF-to-SAC connector credentials from SAP</li><li>In SAC, go to <b>Connections</b> → <b>Add Connection</b> → select <b>SAP SuccessFactors</b>. Enter your SF API credentials</li><li>Build a <b>Story</b> (dashboard) in SAC using the SF data model. SAC can query SF live or use a scheduled data import</li><li>Publish the story and embed it in the SF homepage via a <b>Custom Tile</b> pointing to the SAC story URL</li><li>Live query mode provides near-real-time data but has performance limits on large datasets. Scheduled import provides better performance but has data latency</li></ol><div class="source">Source: SAP SF Implementation Workbook — SAC Integration (Lesson 11.1)</div>`
  },
  { cat:'reporting', f:'green', level:'Report Center',
    q:'Can we give managers access to a report showing only their own direct reports?',
    s:'Yes, use runtime filtering with Logged-in User context. Reports scope to show only data relevant to the person running the report.',
    approach:'Set the report filter to "Employee → Manager = Logged-in User" or use the "My Team" standard filter.',
    tags:['Manager Self-Service','Security'],
    tech:`<ol><li>In the report, add a <b>Filter</b>: <code>Manager = Logged-in User</code>. This dynamically scopes results to the person running the report</li><li>Alternative: use the <b>My Team</b> standard filter, which includes both direct and indirect reports</li><li>For broader scope (manager can see their entire org): use <b>Starting Manager = Logged-in User</b> with hierarchy expansion</li><li>Share the report with the manager role via <code>Report Permissions</code>. When they run it, they see only their team</li></ol><div class="source">Source: SAP SF Implementation Workbook — Report Security (Lesson 10.5)</div>`
  },

  // ═══ INTEGRATIONS ═══
  { cat:'integration', f:'green', level:'Standard Integration',
    q:'Can we integrate Employee Central with SAP Payroll (ECP)?',
    s:'This is the most mature SF integration. EC-to-ECP syncs employee master data, pay components, and time data to Employee Central Payroll.',
    approach:'Use the standard SAP-delivered EC-ECP Point-to-Point integration. Configure replication scenarios for master data and payroll data.',
    tags:['ECP','Payroll'],
    tech:`<ol><li>Ensure both EC and ECP tenants are provisioned and the integration is enabled by SAP Cloud Operations</li><li>In EC Admin Center, go to <code>Integration Center</code> → select the pre-delivered <b>EC-to-ECP Master Data Replication</b> integration</li><li>Configure the replication scenarios: Employee Master Data, Organizational Assignment, Pay Components, Bank Details, and Time Data</li><li>Set the <b>Replication Frequency</b>: near-real-time for master data changes, scheduled for bulk syncs</li><li>Monitor replication via <code>Integration Center → Monitor</code>. Failed records appear with error codes — resolve data issues and retry</li><li>Critical: the Payroll Control Record (PCR) in ECP must be set correctly. If the PCR is locked, payroll data will not replicate</li></ol><div class="source">Source: SAP SF Implementation Workbook — EC-ECP Integration (Lesson 9.1)</div>`
  },
  { cat:'integration', f:'amber', level:'Custom Integration',
    q:'Can we integrate EC with non-SAP payroll like ADP, Ceridian, or UKG?',
    s:'Yes, but requires middleware or custom integration. SF provides APIs to extract data; mapping to payroll format must be custom-built.',
    approach:'Use Integration Center or ODATA API to export employee data. Build an integration layer (CPI, Boomi, MuleSoft, custom) to transform and load.',
    tags:['Third-Party Payroll','Middleware'],
    tech:`<ol><li>Identify all employee data fields the payroll system requires (name, address, pay components, tax info, bank details, etc.)</li><li>Build an <b>Integration Center</b> export job or use <b>ODATA API</b> to extract data from EC on a schedule</li><li>Build a middleware transformation layer: map EC field names to payroll system field names, handle data type conversions, split/add fields as needed</li><li>Deliver the transformed data to the payroll system via its API, SFTP, or flat file</li><li>Build error handling: if a record fails to load, log it, alert HRIS team, and retry</li><li>Build reconciliation: compare EC headcount to payroll headcount weekly to catch sync failures</li></ol><div class="source">Source: SAP SF Implementation Workbook — Third-Party Integrations (Lesson 9.2)</div>`
  },
  { cat:'integration', f:'green', level:'Integration',
    q:'Can we sync employee data from EC to Active Directory or Azure AD?',
    s:'Yes, this is common. Use the SF-to-AzureAD connector (Microsoft-delivered) or build custom integration via ODATA.',
    approach:'For Azure AD: use the Microsoft Azure AD provisioning connector for SuccessFactors. For on-prem AD: build custom integration.',
    tags:['Active Directory','IAM'],
    tech:`<ol><li>For Azure AD: in Azure Portal, go to <b>Enterprise Applications → SuccessFactors → Provisioning</b>. Configure the connector with your SF API credentials</li><li>Map SF fields to AD attributes: employee ID → AD employeeID, name → displayName, department → department, manager → manager</li><li>Set provisioning scope: all employees, or filtered by employment status (Active only). Configure de-provisioning rules (disable vs. delete on termination)</li><li>For on-prem AD: build a custom integration. Use ODATA to query SF for new/changed/terminated employees, then use PowerShell to create/update/disable AD accounts</li><li>Schedule the sync to run daily or more frequently for large organizations</li></ol><div class="source">Source: SAP SF Implementation Workbook — IAM Integration (Lesson 9.3)</div>`
  },
  { cat:'integration', f:'green', level:'API Access',
    q:'Can we make EC data available to external systems via API?',
    s:'SF exposes ODATA and SFAPI (SOAP) APIs. External systems with API credentials can read EC data. Write operations are more restricted.',
    approach:'Generate API credentials in Admin Center. Use ODATA v2/v4 for reads. SFAPI for specific operations. Respect throttling limits.',
    tags:['ODATA','SFAPI'],
    tech:`<ol><li>Generate API credentials: <code>Admin Center → Manage OAuth2 Client Applications</code> → register a new client. Note the Client ID and generate a Client Secret</li><li>Grant the client API permissions: select the entities it can access (e.g., Employee, Job Information, Department) and the access level (Read-only or Read/Write)</li><li>ODATA endpoint format: <code>https://api.successfactors.com/odata/v2/Employee?$filter=userId eq 'jdoe'</code></li><li>Rate limits: standard tenants allow 50-100 ODATA calls/second. Bulk operations should use pagination and respect throttling</li><li>For write operations: use SFAPI SOAP endpoints. Create/Update/Delete operations require the Upsert permission and strict field validation</li></ol><div class="source">Source: SAP SF Implementation Workbook — API & ODATA (Lesson 9.5)</div>`
  },
  { cat:'integration', f:'green', level:'ISC / Integration Center',
    q:'Can EC push employee data to multiple downstream systems simultaneously?',
    s:'Yes, using Integration Center. A single event (new hire, transfer, termination) can trigger multiple outbound integrations.',
    approach:'Configure outbound integrations in Integration Center, each triggered by the same event. Add conditional logic for routing.',
    tags:['Event-Driven','Multi-System'],
    tech:`<ol><li>Create separate <b>Integration Center</b> outbound integrations for each target system (payroll, AD, benefits, expense system, etc.)</li><li>Set each integration's trigger: <b>Event = Employee Hire</b> (or Transfer, Termination, Data Change)</li><li>Add conditional filters: e.g., only send to the UK payroll system if <code>Country = UK</code>, only send to benefits system if <code>Employee Class = Employee</code></li><li>All matching integrations fire simultaneously when the event occurs — no sequencing or dependencies between them</li><li>Monitor all integrations from <code>Integration Center → Monitor</code> dashboard. Each shows success/failure independently</li></ol><div class="source">Source: SAP SF Implementation Workbook — Multi-System Integration (Lesson 9.6)</div>`
  },
  { cat:'integration', f:'amber', level:'Integration',
    q:'Can we integrate SF with SAP S/4HANA for financial and organizational data sync?',
    s:'SAP provides the S/4HANA-to-SF integration package. This syncs org structure, cost centers, and employee data.',
    approach:'Use SAP-delivered integration content for SF + S/4HANA (CPI-based). Define data ownership rules for each data element.',
    tags:['S/4HANA','SAP ERP'],
    tech:`<ol><li>Deploy the SAP-delivered integration package from <b>SAP API Business Hub</b> — search for "SuccessFactors Employee Central to S/4HANA integration"</li><li>The package runs on SAP Cloud Platform Integration (CPI). Configure the iflows for: Org Structure sync, Cost Center sync, Employee Master sync</li><li>Define the system of record for each data element: e.g., Department = SF is source, Cost Center = S/4HANA is source. Set one-way replication for each</li><li>Key consideration: the two systems have different data models — an SF "Department" may map to an S/4HANA "Cost Center Hierarchy Node". The mapping must be built in CPI</li><li>Test with a representative org subset before full deployment. Data mismatches (different codes, missing values) are the #1 cause of integration failures</li></ol><div class="source">Source: SAP SF Implementation Workbook — S/4HANA Integration (Lesson 11.3)</div>`
  },

  // ═══ COMPLIANCE & LOCALIZATION ═══
  { cat:'compliance', f:'green', level:'Configuration',
    q:'Can we configure country-specific fields that only appear for employees in that country?',
    s:'HRIS fields can be scoped by country. When Job Info has that country, the fields automatically appear in the portlet.',
    approach:'When creating a custom HRIS field, set the Country scope. Fields scoped to Germany only appear on records where country = Germany.',
    tags:['Country-Specific','Field Visibility'],
    tech:`<ol><li>In <code>Manage Business Configuration</code>, when adding a custom field, set the <b>Country</b> property to the target country (e.g., <code>Germany</code>)</li><li>The field only appears on the portlet when the employee's Job Info country matches the field's country scope</li><li>For multi-country fields: leave Country blank (global) or create separate fields per country if the label/requirements differ</li><li>Test: create a German employee → verify the Germany-scoped fields appear. Switch country to France → verify the fields disappear</li><li>Country-scoped fields still exist in the data model globally — they are just hidden from the UI for non-matching countries</li></ol><div class="source">Source: SAP SF Implementation Workbook — Country-Specific Configuration (Lesson 2.5)</div>`
  },
  { cat:'compliance', f:'green', level:'Standard',
    q:'Can SF EC handle GDPR requirements — data retention, right to be forgotten, data export?',
    s:'SF has built-in GDPR tools: data retention management, purge functionality, and data subject access request (DSAR) workflows.',
    approach:'Use Data Retention Management for purge rules. Use Subject Access Request tool for DSARs.',
    tags:['GDPR','Data Privacy'],
    tech:`<ol><li>Configure data retention: <code>Admin Center → Data Retention Management</code> → define retention rules per object/entity. Example: "Delete terminated employee data 7 years after termination date"</li><li>Configure purge: <code>Admin Center → Data Purge</code> → schedule purge jobs based on retention rules. Purge permanently deletes data — configure carefully</li><li>For DSAR: use <code>Admin Center → Subject Access Request</code> to generate a data export for a specific person across all SF modules</li><li>For Right to be Forgotten: use <code>Admin Center → Data Purge</code> with the specific person ID. This is a manual admin action, not self-service</li><li>Audit trail: all purge and DSAR actions are logged. Configure <code>Read Audit</code> and <code>Change Audit</code> for additional tracking</li></ol><div class="source">Source: SAP SF Implementation Workbook — GDPR & Data Privacy (Lesson 12.1)</div>`
  },
  { cat:'compliance', f:'amber', level:'Configuration + Integration Center',
    q:'Can we track visa and work permit expiry dates with notifications?',
    s:'Common configuration. Use custom fields for visa type/expiry on Job Info or a custom portlet. Build a scheduled report for notifications.',
    approach:'Add custom fields for visa data. Build an Integration Center scheduled job that queries expiring records and emails HR.',
    tags:['Visa Tracking','Compliance'],
    tech:`<ol><li>Add custom fields to Job Information: <code>visaType</code> (picklist), <code>visaNumber</code>, <code>visaIssueDate</code>, <code>visaExpiryDate</code></li><li>Add these fields to the Job Info portlet layout in <code>Configure People Profile</code></li><li>Build an Integration Center job: query employees where <code>visaExpiryDate ≤ Today + 90 days</code>. Output: employee name, visa type, expiry date, manager</li><li>Schedule the job to run weekly. Email the output to the HR compliance team and relevant managers</li><li>For automated workflows on expiry: create a business rule that flags the record when expiry is within 30 days, but the notification itself requires scheduled jobs</li></ol><div class="source">Source: SAP SF Implementation Workbook — Compliance Tracking (Lesson 12.2)</div>`
  },
  { cat:'compliance', f:'green', level:'RBP Configuration',
    q:'Can we restrict data access by country — HR Germany cannot see French data?',
    s:'Yes, RBP target scoping by country/legal entity is standard. Permission roles can be restricted to specific geographies.',
    approach:'In the permission role, set target population to Legal Entity = Germany. Users assigned this role only see data matching that scope.',
    tags:['Data Isolation','Country Scoping'],
    tech:`<ol><li>In <code>Manage Permission Roles</code>, open the country-specific HR role (e.g., <code>HR_Manager_Germany</code>)</li><li>Under each permission grant, set <b>Target Population</b>: <code>Legal Entity = Germany</code> (or Country = Germany)</li><li>Set <b>Granted</b> for records matching the scope, <b>Restricted</b> for all other records</li><li>Multiple grants in the same role can cover different scopes. Example: Granted for Germany, Granted for Austria, Restricted for everything else</li><li>Test with <code>Permission Debug</code>: impersonate the HR Germany user → search for a French employee → should return no results or show restricted view</li></ol><div class="source">Source: SAP SF Implementation Workbook — RBP Country Scoping (Lesson 8.5)</div>`
  },
  { cat:'compliance', f:'orange', level:'Custom Workflow',
    q:'Does EC support works council (Betriebsrat / CSE / OR) review workflows?',
    s:'No built-in works council module. Build a custom workflow step or integrate with a separate case management system.',
    approach:'Add a custom workflow step "Works Council Review" with dynamic routing to the council representative. Expect 30-50% additional effort in EU deployments.',
    tags:['Works Council','EU Compliance'],
    tech:`<ol><li>Create a custom workflow step of type <b>Approval</b> with label "Works Council Review"</li><li>Configure approver determination: use a business rule that looks up the works council representative from a custom Foundation Object that maps legal entities to council members</li><li>Add the step to all workflow groups covering sensitive changes: Terminations, Mass Changes, Reorganizations, and any data changes that affect employee terms and conditions</li><li>Set timeout rules carefully: works councils in Germany legally have 1-4 weeks to respond depending on the change type. Configure timeout to match the legal requirement</li><li>Document the workflow for your Betriebsrat/CSE/OR consultation. The works council must agree to the digital process as part of their formal agreement</li></ol><div class="source">Source: SAP SF Implementation Workbook — EU Works Council Configuration (Lesson 12.3)</div>`
  },
  { cat:'compliance', f:'amber', level:'Configuration + SAC',
    q:'Can EC support EU Pay Transparency Directive — pay gap reports and pay justification?',
    s:'EC stores pay data and can report on it. Full pay equity analytics require SAP Analytics Cloud or specialized pay equity tools.',
    approach:'Ensure pay components are consistently structured. Use Report Center for basic pay gap data. For advanced analytics, use SAC or pay equity platforms.',
    tags:['Pay Transparency','EU Directive'],
    tech:`<ol><li>Ensure pay data consistency: all pay components must be structured and categorized (base pay, bonus, allowances) in EC Compensation or custom fields</li><li>Build a Report Center report: group by gender, job grade, and location → show average base pay, average total comp, and headcount per group → calculate pay gap percentages</li><li>For gap justification: add a custom field on Job Info for "pay differential justification" (e.g., tenure, performance, market adjustment, critical skill)</li><li>For advanced analytics: build a SAC story that visualizes pay gaps across the org, identifies outliers, and tracks gap closure over time</li><li>Note: the EU Directive requires reporting by 2027. SF provides data but the analytics and justification workflow layer needs additional build</li></ol><div class="source">Source: SAP SF Implementation Workbook — Pay Equity & EU Directive (Lesson 12.4)</div>`
  },
  { cat:'compliance', f:'green', level:'Standard',
    q:'Can we set up audit trails to track who changed what employee data and when?',
    s:'Yes, Change Audit and Read Audit are standard features. They log every field-level change with user, timestamp, old value, and new value.',
    approach:'Enable Change Audit in Company Settings. View audit logs per record or via the Audit Report in Report Center.',
    tags:['Audit Trail','Change Log'],
    tech:`<ol><li>Enable audit: <code>Admin Center → Company Settings → Change Audit</code> → turn on for all HRIS elements</li><li>Optionally enable <b>Read Audit</b> to also log who viewed employee records (GDPR-relevant)</li><li>View per record: open an employee's profile → <b>Change History</b> tab → select the HRIS element → every field change is listed with before/after values, user, and timestamp</li><li>For bulk audit: use <code>Report Center → Change Audit Report</code>. Filter by date range, user, employee, or HRIS element</li><li>Audit data storage: configure retention in <code>Data Retention Management</code>. Standard is 5-10 years depending on your policy</li></ol><div class="source">Source: SAP SF Implementation Workbook — Audit Configuration (Lesson 12.5)</div>`
  },

  // ═══ TIME & ATTENDANCE ═══
  { cat:'time', f:'green', level:'Configuration',
    q:'Can we create custom absence types beyond vacation, sick leave, and public holidays?',
    s:'The Time Off module supports custom time account types like "Study Leave", "Volunteering Days", "Sabbatical", "Bereavement", etc.',
    approach:'Define new time account types in Manage Time Off Structures. Configure accrual rules, balance limits, and booking rules.',
    tags:['Time Off','Absence Types'],
    tech:`<ol><li>Go to <code>Admin Center → Manage Time Off Structures → Time Account Types</code></li><li>Click <b>Create New</b>. Set: Account Type Name (e.g., "Study Leave"), time unit (Days/Hours), and booking rules</li><li>Configure <b>Accrual Rules</b>: how the balance accumulates (annual grant, monthly proration, tenure-based tiers, or custom formula)</li><li>Set <b>Booking Rules</b>: minimum/maximum booking per request, advance notice requirements, and whether partial-day booking is allowed</li><li>Assign the time account type to employees via <b>Time Profile</b>: go to the employee's Time Profile → add the account type with the applicable effective date</li></ol><div class="source">Source: SAP SF Implementation Workbook — Time Off Configuration (Lesson 13.1)</div>`
  },
  { cat:'time', f:'green', level:'Configuration',
    q:'Can we set up a time account that accrues based on tenure or seniority?',
    s:'Yes, accrual rules support tenure-based tiers, job-level multipliers, and country-specific formulas.',
    approach:'In the time account type, configure the accrual rule with formulas using tenure, FTE, and job level as variables.',
    tags:['Accrual Rules','Time Accounts'],
    tech:`<ol><li>In the time account type definition, under <b>Accrual Rules</b>, select <b>Custom Formula</b></li><li>Build the formula: <code>IF YearsOfService < 5 THEN 25 ELSE IF YearsOfService < 10 THEN 28 ELSE 30</code></li><li>Add FTE proration: multiply the accrual by the employee's FTE (e.g., 0.8 FTE gets 80% of the days)</li><li>Add country-specific logic: use <code>Country</code> in the formula to apply different rules per country</li><li>Test: create employees with different tenures and verify the accrual amounts match the expected values</li></ol><div class="source">Source: SAP SF Implementation Workbook — Time Off Accrual Rules (Lesson 13.2)</div>`
  },
  { cat:'time', f:'green', level:'Configuration',
    q:'Can employees request partial-day absences like a 2-hour doctor appointment?',
    s:'Time Off supports partial-day leave. Employees specify start/end times. The balance deducts in hours.',
    approach:'Configure the time account type with Booking Unit = Hours. Set the time recording profile for partial-day bookings.',
    tags:['Partial Day','Hourly Leave'],
    tech:`<ol><li>In the time account type, set <b>Booking Unit = Hours</b> (not Days)</li><li>In the employee's <b>Time Profile</b>, ensure <b>Daily Working Hours</b> is set correctly (e.g., 8 hours for full-time employees)</li><li>When booking time off, the employee selects <b>Partial Day</b> and enters start and end times (e.g., 09:00–11:00)</li><li>The system calculates the deduction: 2 hours used from the balance. Remaining hours are shown in the balance display</li><li>Manager approval workflow works the same for partial-day as full-day — the request shows the time window</li></ol><div class="source">Source: SAP SF Implementation Workbook — Time Off Partial Day (Lesson 13.3)</div>`
  },
  { cat:'time', f:'green', level:'Standard',
    q:'Can time-off requests automatically sync to the team calendar?',
    s:'The Team Absence Calendar is standard. It shows all approved absences for a manager\'s direct reports.',
    approach:'No configuration needed — the Team Absence Calendar is active by default for managers.',
    tags:['Calendar','Manager View'],
    tech:`<ol><li>Managers navigate to: <b>Homepage → Team Absence Calendar</b></li><li>The calendar shows all approved absences for their direct (and optionally indirect) reports</li><li>View modes: Day, Week, Month. Color-coded by absence type (vacation = blue, sick = red, etc.)</li><li>Managers can click an absence to see details: who, dates, type, and status</li><li>To add the calendar to the homepage: <code>Manage Homepage</code> → add the <b>Team Absence Calendar</b> tile</li></ol><div class="source">Source: SAP SF Standard — Team Absence Calendar (enabled by default)</div>`
  },
  { cat:'time', f:'amber', level:'Module Configuration',
    q:'Can we set up Time Sheet for project time tracking or hourly workers?',
    s:'SF Time Sheet is a separate tab. It supports project-based time entry, work schedules, overtime calculation, and approval workflows.',
    approach:'Enable Time Sheet in Company Settings. Configure work schedules, time types, and approval flows. Requires Time Sheet licensing.',
    tags:['Time Sheet','Project Time'],
    tech:`<ol><li>Enable Time Sheet: <code>Admin Center → Company Settings → Time Sheet</code> → turn on</li><li>Configure <b>Work Schedules</b>: define standard working hours, break rules, and overtime thresholds per employee group</li><li>Configure <b>Time Types</b>: Regular, Overtime, Travel, Training, On-Call, etc. Each type has accounting rules</li><li>Set up <b>Approval Flows</b>: similar to EC workflows — manager approves submitted timesheets, with escalation rules</li><li>For project tracking: integrate with the <b>Job Codes/Projects</b> Foundation Object → employees select the project they worked on per time entry</li><li>Payroll integration: time data must be replicated to ECP or exported to external payroll. Use the standard EC-to-ECP time replication or Integration Center for external systems</li></ol><div class="source">Source: SAP SF Implementation Workbook — Time Sheet Configuration (Lesson 13.4)</div>`
  },
  { cat:'time', f:'green', level:'Configuration',
    q:'Can the system prevent employees from booking leave with insufficient balance?',
    s:'Standard. The system checks available balance before allowing a booking. You can allow negative balances up to a limit.',
    approach:'In the time account type, set Allow Negative Balance = No for strict enforcement, or set a negative limit for limited overdraft.',
    tags:['Balance Validation'],
    tech:`<ol><li>In <code>Manage Time Off Structures → Time Account Types</code>, open the account type</li><li>Set <b>Allow Negative Balance</b>: <code>No</code> (strict — blocks booking if balance would go below zero)</li><li>Or set to <code>Yes</code> and configure <b>Negative Balance Limit</b>: e.g., -5 days. Employees can overdraw up to 5 days but cannot book beyond that</li><li>The balance check runs at booking time. If the employee lacks sufficient balance, they see an error message and cannot submit the request</li><li>For future-dated bookings: the system checks the projected balance at the date of the requested absence, not the current balance</li></ol><div class="source">Source: SAP SF Implementation Workbook — Time Off Validation (Lesson 13.5)</div>`
  },

  // ═══ DATA IMPORT & MIGRATION ═══
  { cat:'data', f:'green', level:'Import',
    q:'Can we mass-import employee data from CSV or Excel files?',
    s:'SF provides standard import templates for all HRIS elements, Foundation Objects, and Position data.',
    approach:'Download the standard import template. Fill in data, validate, and import. Use "Validate Only" first to catch errors.',
    tags:['CSV Import','Templates'],
    tech:`<ol><li>Go to <code>Admin Center → Import Employee Data</code></li><li>Select the entity to import: Basic Import (new hires), Job Information, Compensation, Personal Information, etc.</li><li>Download the <b>CSV Template</b> for that entity. The template includes all standard and custom fields</li><li>Fill in your data. Key rules: (a) date format = YYYY-MM-DD, (b) picklists use the External Code, not the label, (c) FO references use the FO's external code (e.g., Department code, not Department name)</li><li>Upload the file → select <b>Validate Only</b> → review errors → fix → re-upload with <b>Import</b> mode</li><li>Import limits: typically 10,000 rows per file. For larger volumes, split into multiple files</li></ol><div class="source">Source: SAP SF Implementation Workbook — Data Import (Lesson 7.1)</div>`
  },
  { cat:'data', f:'amber', level:'Integration Center',
    q:'Can we schedule regular imports — like a nightly feed from a legacy HR system?',
    s:'Integration Center handles scheduled imports. The import engine itself does not schedule; it is triggered by the integration layer.',
    approach:'Build an Integration Center job that fetches data from the source and loads into SF. Schedule it to run nightly.',
    tags:['Scheduled Import','Automation'],
    tech:`<ol><li>Go to <code>Admin Center → Integration Center</code> → <b>Create New Integration</b></li><li>Select source type: <b>File (SFTP)</b> if the legacy system drops a file, or <b>ODATA / REST</b> if you can query the source directly</li><li>Map the source fields to SF target fields. Configure transformation rules (data type conversions, default values, lookups)</li><li>Set the destination: <b>SuccessFactors</b> entity (Employee, Job Info, etc.) with Upsert mode (insert or update based on matching key)</li><li>Schedule: daily at 2:00 AM. The integration runs server-side — no user action required</li><li>Monitor via <code>Integration Center → Monitor</code>. Configure email alerts for failures so the HRIS team can respond promptly</li></ol><div class="source">Source: SAP SF Implementation Workbook — Scheduled Integrations (Lesson 7.3)</div>`
  },
  { cat:'data', f:'green', level:'Standard',
    q:'Can we export all employee data for audit or backup purposes?',
    s:'Full data exports available via Report Center, Integration Center, or ODATA API. Large exports may need to be chunked.',
    approach:'For ad-hoc: Report Center with all columns, export to CSV/Excel. For automated: Integration Center export job. For API: ODATA queries.',
    tags:['Data Export','Backup'],

// APP
// ═══════════════════════════════════════════

let activeCategory = 'all', activeFeas = 'all', searchQuery = '', techMode = false;

function init() {
  initTheme();
  renderCategories();
  filterEntries();
  const queryEl = document.getElementById('client-query');
  if (queryEl) {
    queryEl.addEventListener('input', function() { searchQuery = this.value.trim().toLowerCase(); filterEntries(); });
    queryEl.addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('content').scrollIntoView({ behavior: 'smooth' }); } });
  }
}

function initTheme() {
  const saved = localStorage.getItem('sf-compass-theme');
  if (saved) {
    setTheme(saved);
  } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
    setTheme('light');
  }
  // Listen for system changes
  window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', (e) => {
    if (!localStorage.getItem('sf-compass-theme')) {
      setTheme(e.matches ? 'light' : 'dark');
    }
  });
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  setTheme(current === 'light' ? 'dark' : 'light');
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('sf-compass-theme', theme);
  const btn = document.querySelector('.theme-toggle-btn');
  if (btn) btn.textContent = theme === 'light' ? '☾' : '☀';
}

function renderCategories() {
  const list = document.getElementById('category-list');
  const counts = {};
  for (const e of ENTRIES) counts[e.cat] = (counts[e.cat] || 0) + 1;
  const modules = {};
  for (const c of CATEGORIES) {
    if (!modules[c.module]) modules[c.module] = { cats: [], total: 0, icon: c.modIcon };
    modules[c.module].cats.push(c);
    modules[c.module].total += (counts[c.id] || 0);
  }
  let html = `<div class="cat-item active" data-cat="all" onclick="selectCategory('all', this)">
    <span class="icon">🏠</span> All Modules <span class="count">${ENTRIES.length}</span></div>`;
  for (const [modName, modData] of Object.entries(modules)) {
    html += `<div class="module-header" onclick="toggleModule(this)" data-module="${modName}">
      <span class="mod-icon">${modData.icon}</span>${modName}
      <span class="mod-count">${modData.total}</span>
      <span class="mod-chevron">▸</span></div>
    <div class="module-categories" data-module="${modName}">`;
    for (const c of modData.cats) {
      html += `<div class="cat-item" data-cat="${c.id}" onclick="event.stopPropagation();selectCategory('${c.id}', this)">
        <span class="icon">${c.icon}</span> ${c.name} <span class="count">${counts[c.id]||0}</span></div>`;
    }
    html += `</div>`;
  }
  list.innerHTML = html;
  setTimeout(() => {
    const ecHeader = document.querySelector('.module-header[data-module="Employee Central"]');
    if (ecHeader) toggleModule(ecHeader);
  }, 100);
}

function toggleModule(header) {
  const moduleName = header.getAttribute('data-module');
  const categories = document.querySelector(`.module-categories[data-module="${moduleName}"]`);
  if (!categories) return;
  const isOpen = categories.classList.contains('open');
  document.querySelectorAll('.module-categories.open').forEach(c => c.classList.remove('open'));
  document.querySelectorAll('.module-header.open').forEach(h => h.classList.remove('open'));
  if (!isOpen) { categories.classList.add('open'); header.classList.add('open'); }
}

function selectCategory(id, el) {
  activeCategory = id;
  document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  const cat = CATEGORIES.find(c => c.id === id);
  document.getElementById('active-cat-label').textContent = id === 'all' ? 'All Modules' : (cat ? cat.module + ' › ' + cat.name : id);
  filterEntries();
}

function setFeasFilter(feas, el) {
  activeFeas = feas;
  document.querySelectorAll('.feas-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  filterEntries();
}

function toggleTechDetails() {
  techMode = !techMode;
  const pill = document.getElementById('tech-pill');
  const label = document.getElementById('tech-label');
  if (techMode) {
    pill.classList.add('active');
    label.textContent = 'Implementation Steps: ON';
  } else {
    pill.classList.remove('active');
    label.textContent = 'Implementation Steps';
  }
  filterEntries();
}

function filterEntries() {
  const sidebarQ = document.getElementById('search-box').value.toLowerCase();
  const clientQ = document.getElementById('client-query') ? document.getElementById('client-query').value.toLowerCase() : '';
  searchQuery = sidebarQ || clientQ;
  let filtered = ENTRIES;
  if (activeCategory !== 'all') filtered = filtered.filter(e => e.cat === activeCategory);
  if (activeFeas !== 'all') filtered = filtered.filter(e => e.f === activeFeas);
  if (searchQuery) {
    const terms = searchQuery.split(/\s+/).filter(t => t.length > 0);
    filtered = filtered.filter(e => {
      const haystack = [e.q, e.s, e.approach, ...e.tags, e.tech || ''].join(' ').toLowerCase();
      return terms.some(t => haystack.includes(t));
    });
  }
  document.getElementById('result-count').textContent = `${filtered.length} item${filtered.length !== 1 ? 's' : ''}`;
  const qmc = document.getElementById('query-match-count');
  if (qmc && searchQuery) { qmc.textContent = `${filtered.length} match${filtered.length !== 1 ? 'es' : ''}`; }
  else if (qmc) { qmc.textContent = ''; }
  renderEntries(filtered);
}

function renderEntries(entries) {
  const content = document.getElementById('content');
  if (!entries.length) {
    content.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><h3>No matching items</h3><p>Try adjusting your search or filters. ${ENTRIES.length} scenarios across ${CATEGORIES.length} topic areas.</p></div>`;
    return;
  }
  const feasLabels = { green:'Fully Supported', amber:'Partially Supported', orange:'Workaround Required', red:'Limited / Not Supported' };
  const feasIcons = { green:'✓', amber:'◐', orange:'⚒', red:'✗' };

  content.innerHTML = entries.map((e, i) => `
    <div class="entry${techMode ? ' tech-visible' : ''}" id="entry-${i}" onclick="toggleEntry(${i})">
      <div class="entry-header">
        <div class="feasibility-badge ${e.f}">${feasIcons[e.f]}</div>
        <div class="entry-body">
          <div class="entry-question">${highlight(e.q)}</div>
          <div class="entry-subtitle">${feasLabels[e.f]} · ${e.level}</div>
          <div class="entry-tags">
            ${e.tags.map(t => `<span class="tag ${e.f==='green'?'green':e.f==='amber'?'amber':e.f==='orange'?'orange':'red'}">${t}</span>`).join('')}
          </div>
          <div class="entry-detail">
            <h4>Summary</h4><p>${e.s}</p>
            <h4>Approach</h4><p>${e.approach}</p>
            <div class="tech-section">
              <h4>⚙ Technical Implementation Steps</h4>
              ${e.tech || '<p style="color:var(--dim)">Detailed steps coming soon.</p>'}
            </div>
            <div class="detail-grid" style="margin-top:12px">
              <div class="detail-item"><label>Feasibility</label><div class="value">${feasLabels[e.f]}</div></div>
              <div class="detail-item"><label>Effort Level</label><div class="value">${e.level}</div></div>
              <div class="detail-item"><label>Category</label><div class="value">${CATEGORIES.find(c=>c.id===e.cat)?.name||e.cat}</div></div>
            </div>
          </div>
          <span class="expand-hint" onclick="event.stopPropagation();toggleEntry(${i})">Click to expand details →</span>
        </div>
      </div>
    </div>
  `).join('');
}

function highlight(text) {
  if (!searchQuery) return text;
  const esc = searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${esc})`, 'gi'), '<mark style="background:rgba(91,156,245,0.3);color:#fff;padding:0 2px;border-radius:2px">$1</mark>');
}

function toggleEntry(i) {
  const el = document.getElementById('entry-' + i);
  if (!el) return;
  el.classList.toggle('expanded');
  const hint = el.querySelector('.expand-hint');
  if (hint) hint.textContent = el.classList.contains('expanded') ? 'Click to collapse ↑' : 'Click to expand details →';
}

document.getElementById('search-box').addEventListener('input', filterEntries);
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== document.getElementById('search-box')) {
    e.preventDefault(); document.getElementById('search-box').focus();
  }
  if (e.key === 'Escape') document.getElementById('search-box').blur();
});

init();
</script>
</body>
</html>
